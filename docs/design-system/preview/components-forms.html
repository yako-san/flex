<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--font-sans); }
  .card { padding: 20px 24px; color: var(--dark); display: grid; gap: 14px; }
  .group { display: grid; grid-template-columns: 90px 1fr; gap: 12px; align-items: center; }
  .label-system { font-size: 11px; font-weight: 600; text-transform: lowercase; color: rgba(0,0,0,0.5); }
  .input-system {
    width: 100%; border: 1.5px solid rgba(0,0,0,0.2); border-radius: 12px;
    padding: 8px 14px; font-size: 14px; background: #fff; color: #000;
    outline: none;
  }
  .input-system.focused {
    border-color: #fff056;
    box-shadow: 0 0 0 3px rgba(255,240,86,0.4);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .check { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
  .check input {
    appearance: none; -webkit-appearance: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(0,0,0,0.5); border-radius: 4px;
    background: transparent; cursor: pointer; position: relative;
  }
  .check input:checked::after {
    content: ''; position: absolute; left: 4px; top: 0;
    width: 6px; height: 12px;
    border: solid rgba(0,0,0,0.7); border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
</style></head>
<body>
<div class="card">
  <div class="group">
    <label class="label-system">nom client</label>
    <input class="input-system" value="Julie St-Arnault">
  </div>
  <div class="group">
    <label class="label-system">téléphone</label>
    <input class="input-system focused" value="514-555-0142">
  </div>
  <div class="row">
    <label class="check"><input type="checkbox" checked> Évaluation envoyée</label>
    <label class="check"><input type="checkbox"> Bon de sortie</label>
  </div>
</div>
</body></html>
