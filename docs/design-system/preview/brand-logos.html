<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #929292; font-family: var(--font-sans); }
  .card { padding: 20px 24px; display: flex; gap: 28px; align-items: center; justify-content: center; }
  .logo { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .logo img { display: block; }
  .label { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.6); }
</style></head>
<body>
<div class="card">
  <div class="logo">
    <img src="../assets/flex-rond-yako.svg" alt="logo yako" width="110" height="110">
    <span class="label">flex-rond-yako</span>
  </div>
  <div class="logo">
    <img src="../assets/flex-rond-fr.svg" alt="logo fr" width="90" height="90">
    <span class="label">flex-rond-fr</span>
  </div>
  <div class="logo">
    <img src="../assets/flex-f-brun.svg" alt="F brun" width="72" height="72">
    <span class="label">flex-f-brun</span>
  </div>
  <div class="logo">
    <img src="../assets/flex-f-jaune.svg" alt="F jaune" width="72" height="72">
    <span class="label">flex-f-jaune</span>
  </div>
</div>
</body></html>
