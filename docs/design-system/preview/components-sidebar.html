<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #5E5E5E; font-family: var(--font-sans); height: 100%; transition: background 220ms ease; }
  body.light-mode { background: #BFBFBF; }
  body { min-height: 100vh; }
  /* Frame fills the viewport; padding 20px all around so the sidebar
     can stretch to fill the available height. */
  .frame { display: flex; padding: 20px; height: 100vh; box-sizing: border-box; }

  .sb-stage {
    position: relative;
    display: flex; align-items: stretch;     /* sidebar fills frame height */
    flex-shrink: 0;
  }

  /* Sibling ground shadows — anchored at the BASE of the sidebar so the
     bottom of the pill touches the shadow. */
  .shadow-a, .shadow-b {
    position: absolute; left: 50%;
    bottom: -3px;
    transform: translateX(-50%) translateY(50%);
    border-radius: 50%;
    pointer-events: none;
    transition: width 320ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .shadow-a {
    width: 150px; height: 5px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0) 70%);
    filter: blur(3px);
  }
  .shadow-b {
    width: 80px; height: 3px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
    filter: blur(2px);
  }
  .sb-stage[data-expanded="true"] .shadow-a { width: 300px; height: 7px; filter: blur(4px); }
  .sb-stage[data-expanded="true"] .shadow-b { width: 160px; height: 4px; filter: blur(2.5px); }

  /* Sidebar fills the stage height. Width transitions on hover. */
  .sidebar {
    background: #fff056; border-radius: 50px;
    padding: 20px 0;
    width: 100px;
    display: flex; flex-direction: column; align-items: stretch;
    gap: 14px;
    position: relative; z-index: 1;
    transition: width 320ms cubic-bezier(0.4, 0, 0.2, 1);
    overflow: visible;
    flex: 1 0 auto;        /* fill stage height */
  }
  .sb-stage[data-expanded="true"] .sidebar { width: 200px; }

  /* Logo block — top, fixed size (60×60 collapsed, 120×120 expanded).
     Always centered horizontally regardless of sidebar width. */
  .sb-logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
  .sb-logo {
    position: relative;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    cursor: pointer;
    width: 60px; height: 60px;
    transition: width 320ms cubic-bezier(0.4, 0, 0.2, 1),
                height 320ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sb-stage[data-expanded="true"] .sb-logo { width: 120px; height: 120px; }
  .sb-logo .logo-img {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    border-radius: 50%;
    transition: opacity 200ms ease;
  }
  .sb-logo .logo-img.collapsed { background-image: url("../assets/logo-F-brun-rond.svg"); opacity: 1; }
  .sb-logo .logo-img.expanded  { background-image: url("../assets/logo-FLEX-rond-yako.svg"); opacity: 0; }
  .sb-stage[data-expanded="true"] .logo-img.collapsed { opacity: 0; }
  .sb-stage[data-expanded="true"] .logo-img.expanded  { opacity: 1; }

  .sb-version {
    font-size: 11px; color: #9a7b4f; font-weight: 600; text-align: center;
    line-height: 1.2;
    opacity: 0; height: 0; overflow: hidden;
    transition: opacity 200ms ease 80ms, height 320ms ease;
  }
  .sb-stage[data-expanded="true"] .sb-version { opacity: 1; height: 28px; }

  /* ===== Popover (anchored off logo, shown on logo hover) ===== */
  .sb-popover {
    position: absolute;
    top: 20px; left: calc(100% + 16px);
    background: #ffffff; border-radius: 14px;
    padding: 10px 4px;
    width: 200px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; gap: 2px;
    z-index: 50;
    opacity: 0; pointer-events: none;
    transform: translateX(-8px);
    transition: opacity 180ms ease, transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sb-stage[data-popover="true"] .sb-popover {
    opacity: 1; pointer-events: auto;
    transform: translateX(0);
  }
  .sb-pop-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    color: var(--dark); cursor: pointer; transition: background 150ms;
  }
  .sb-pop-item:hover { background: #fafafa; }
  .sb-pop-item svg { color: rgba(0,0,0,0.55); flex-shrink: 0; }

  /* ===== Primary nav ===== */
  .sb-nav {
    display: flex; flex-direction: column; align-items: stretch;
    gap: 6px;
    margin: auto 0;
    width: 100%;
    padding: 0;
  }
  /* Each row is a VERTICAL stack: pastille on top, label below.
     Both columns share the same horizontal footprint (sidebar width)
     so the pastille is always centered regardless of expand state.
     Label slot is reserved (24px tall) but text fades in on expand. */
  .sb-item {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    text-decoration: none;
    gap: 4px;
  }
  .sb-pastille {
    width: 60px; height: 60px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #9a7b4f; transition: background 150ms;
    position: relative;
    flex-shrink: 0;
  }
  .sb-item.active .sb-pastille { background: #9a7b4f; color: #fff056; }
  .sb-item:hover:not(.active) .sb-pastille { background: rgba(154,123,79,0.12); }

  /* Label sits BELOW the pastille. Slot has a fixed height (reserved
     space even when empty) so pastilles stay vertically aligned between
     states. Text opacity fades in on expand. */
  .sb-label {
    height: 16px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; color: #9a7b4f;
    white-space: nowrap;
    opacity: 0;
    line-height: 16px;
    transition: opacity 200ms ease 80ms, font-size 320ms ease;
  }
  .sb-stage[data-expanded="true"] .sb-label { opacity: 1; font-size: 13px; }

  .sb-badge {
    position: absolute; top: -2px; right: -2px;
    min-width: 18px; height: 18px; padding: 0 4px;
    border-radius: 999px; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px #fff056;
  }
  .sb-badge.vert  { background: #62e335; color: #000; }
  .sb-badge.rouge { background: #d92020; color: #fff; }

  .sb-divider {
    width: 60%; margin: 4px auto; border: 0;
    border-top: 1px solid rgba(154,123,79,0.3);
    transition: width 320ms ease;
  }
  .sb-stage[data-expanded="true"] .sb-divider { width: 80%; }

  /* ===== Login pastille — at the BOTTOM of the column (mt: auto) ===== */
  .sb-login-wrap { display: flex; justify-content: center; flex-shrink: 0; }
  .sb-login {
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fbbc04 0%, #ea4335 35%, #4285f4 70%, #34a853 100%);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    position: relative; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 22px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    transition: width 320ms cubic-bezier(0.4, 0, 0.2, 1),
                height 320ms cubic-bezier(0.4, 0, 0.2, 1),
                font-size 320ms ease;
  }
  .sb-stage[data-expanded="true"] .sb-login { width: 80px; height: 80px; font-size: 28px; }
  .sb-login::after {
    content: ""; position: absolute;
    width: 14px; height: 14px; border-radius: 50%;
    background: #62e335; right: 0; bottom: 2px;
    box-shadow: 0 0 0 2px #fff056;
  }

  .demo-hint {
    margin-left: 24px;
    font-family: var(--font-mono); font-size: 11px;
    color: rgba(255,255,255,0.7);
    align-self: center; max-width: 220px; line-height: 1.5;
  }
  .demo-hint b { color: #fff; }
</style></head>

<script>
  const stage   = document.getElementById('stage');
  const logo    = document.getElementById('logo');
  const popover = document.getElementById('popover');
  document.getElementById('theme-toggle')
    .addEventListener('click', () => document.body.classList.toggle('light-mode'));

  // Sidebar expand/collapse on mouseenter/leave
  stage.addEventListener('mouseenter', () => stage.setAttribute('data-expanded', 'true'));
  stage.addEventListener('mouseleave', () => {
    stage.setAttribute('data-expanded', 'false');
    stage.setAttribute('data-popover', 'false');
  });

  // Logo popover on hover — kept open while hovering popover itself
  logo.addEventListener('mouseenter',    () => stage.setAttribute('data-popover', 'true'));
  popover.addEventListener('mouseenter', () => stage.setAttribute('data-popover', 'true'));
  popover.addEventListener('mouseleave', () => stage.setAttribute('data-popover', 'false'));
</script>
</body></html>
