<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--font-sans); }
  .card { padding: 20px 22px; color: var(--dark); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary-60); text-align: center; }
  .nav .label { font-weight: 700; color: var(--dark); text-transform: uppercase; letter-spacing: 0.06em; }
  .sectionhead { font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary-50); text-transform: lowercase; margin: 0 0 10px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 14px; }
  .grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
  .icon { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .icon svg { color: var(--dark); }
</style></head>
<body>
<div class="card">
  <p class="sectionhead">5 entrées de sidebar — Heroicons V1 (24/outline)</p>
  <div class="grid-5 nav">
    <!-- INVENTAIRE — TagIcon -->
    <div class="icon">

      <span class="label">Inventaire</span>
    </div>

    <!-- Aide — QuestionMarkCircleIcon -->

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">

</div>
