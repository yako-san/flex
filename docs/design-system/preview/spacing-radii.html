<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--font-sans); }
  .card { padding: 20px 24px; display:grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .stack { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background: rgba(255,255,255,0.85); border: 1.5px solid rgba(0,0,0,0.1); width: 100%; height: 60px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary-60); }
  .val   { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary-50); }
</style></head>
<body>
<div class="card">
  <div class="stack"><div class="box" style="border-radius: 12px;"></div><div class="label">input</div><div class="val">12px</div></div>
  <div class="stack"><div class="box" style="border-radius: 16px;"></div><div class="label">card · 2xl</div><div class="val">16px</div></div>
  <div class="stack"><div class="box" style="border-radius: 30px;"></div><div class="label">bloc · btn-pill</div><div class="val">30px</div></div>
  <div class="stack"><div class="box" style="border-radius: 50px;"></div><div class="label">sidebar · shell</div><div class="val">50px</div></div>
</div>
</body></html>
