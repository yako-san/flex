<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--font-sans); }
  .card { padding: 20px 24px; color: var(--dark); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    font-size: 11px; font-weight: 600; text-transform: lowercase;
    text-align: left; padding: 8px 12px; color: var(--text-secondary-60);
    border-bottom: 1px solid #e0e0e0; background: rgba(255,255,255,0.5);
  }
  tbody td { padding: 8px 12px; }
  .even { background: rgba(255,255,255,0.70); }
  .odd  { background: rgba(255,255,255,0.85); }
  .item { font-weight: 700; }
  .sku  { color: #1565c0; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
  .num  { font-weight: 400; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="card">
  <table>
    <thead>
      <tr><th>item</th><th>sku</th><th style="text-align:right;">stock</th><th style="text-align:right;">prix vente</th></tr>
    </thead>
    <tbody>
      <tr class="even"><td class="item">Babac, Fourche 27" 1"</td><td class="sku">26-057</td><td style="text-align:right;" class="num">1</td><td style="text-align:right;" class="num">46,25 $</td></tr>
      <tr class="odd"><td class="item">Surly, Guidon Open Bar Noir</td><td class="sku">—</td><td style="text-align:right;" class="num">1</td><td style="text-align:right;" class="num">74,00 $</td></tr>
      <tr class="even"><td class="item">Satori, Riser de potence #4</td><td class="sku">26-698</td><td style="text-align:right;" class="num">2</td><td style="text-align:right;" class="num">40,70 $</td></tr>
    </tbody>
  </table>
</div>
</body></html>
