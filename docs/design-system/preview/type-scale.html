<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--font-sans); }
  .card { padding: 20px 24px; color: var(--dark); }
  .row { display: grid; grid-template-columns: 56px 1fr auto; align-items: baseline; gap: 12px; padding: 4px 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary-60); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary-50); }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="tag">h1</span><span style="font-size:36px;font-weight:300;color:#fff056;background:#929292;padding:0 12px;border-radius:8px;line-height:1;">Dashboard</span><span class="meta">50/300 thin · jaune</span></div>
  <div class="row"><span class="tag">h2</span><span style="font-size:1.8rem;font-weight:900;">Bon de travail</span><span class="meta">28.8/900 black</span></div>
  <div class="row"><span class="tag">h3</span><span style="font-size:1.3rem;font-weight:600;">1. Direction</span><span class="meta">20.8/600</span></div>
  <div class="row"><span class="tag">h4</span><span style="font-size:0.9rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;">Inventaire</span><span class="meta">14.4/900 caps</span></div>
  <div class="row"><span class="tag">h5</span><span style="font-size:11px;font-weight:600;text-transform:lowercase;color:var(--text-secondary-60);">bons de travail</span><span class="meta">11/600 lc</span></div>
  <div class="row"><span class="tag">body</span><span style="font-size:14px;">Julie St-Arnault · Rocky Mountain Metro 10</span><span class="meta">14/400</span></div>
</div>
</body></html>
