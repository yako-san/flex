<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #929292; font-family: var(--font-sans); }
  .card { padding: 22px 24px 32px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .stack { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width: 64px; height: 64px; background: #fff; }

  /* Sidebar swatch + ground shadow rendered as SIBLINGS — shadow first
     (painted behind), pill second (painted in front). No z-index gymnastics. */
  .sidebar-stage { position: relative; width: 60px; height: 100px;
                   display: flex; align-items: flex-start; justify-content: center; }
  .shadow {
    position: absolute;
    left: 50%;
    bottom: 11px;             /* aligned with swatch bottom */
    transform: translateX(-50%) translateY(50%);
    width: 57px;              /* 150% of 38 */
    height: 5px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%;
    filter: blur(3px);
    pointer-events: none;
  }
  .shadow.hover {
    width: 65px;
    height: 6px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.60) 0%, rgba(0,0,0,0) 70%);
    filter: blur(4px);
  }
  /* Inner contact (shadow B) — sharper, tighter core stacked on top of
     the soft outer shadow A. Renders just before the pill so the pill
     still covers any overlap from above. */
  .shadow-b {
    position: absolute;
    left: 50%;
    bottom: 11px;
    transform: translateX(-50%) translateY(50%);
    width: 30px;              /* 80% of 38 */
    height: 3px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%;
    filter: blur(2px);
    pointer-events: none;
  }
  .shadow-b.hover {
    width: 34px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 70%);
  }
  .sidebar-swatch {
    width: 38px; height: 84px;
    background: #fff056; border-radius: 22px;
    position: relative;
  }
  /* In the hover demo, lift the pill a touch above the shadow centre. */
  .sidebar-swatch.hover { transform: translateY(-5px); }

  .label { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.78); }
  .val   { font-family: var(--font-mono); font-size: 9px; color: rgba(255,255,255,0.55);
           text-align:center; line-height: 1.3; }
</style></head>
<body>
<div class="card">
  <div class="stack">
    <div class="box" style="border-radius:16px; box-shadow: 0 2px 6px rgba(0,0,0,0.10);"></div>
    <div class="label">card</div>
    <div class="val">0 2px 6px / .10</div>
  </div>
  <div class="stack">
    <div class="box" style="border-radius:50%; width:48px; height:48px; box-shadow: 0 2px 6px rgba(0,0,0,0.18);"></div>
    <div class="label">add btn</div>
    <div class="val">0 2px 6px / .18</div>
  </div>
  <div class="stack">
    <div class="sidebar-stage">
      <span class="shadow"></span>
      <span class="shadow-b"></span>
      <div class="sidebar-swatch"></div>
    </div>
    <div class="label">sidebar · contact</div>
    <div class="val">A : 150% w · 5h · 3 blur · 80% α<br>B : 80% w · 3h · 2 blur · 100% α</div>
  </div>
  <div class="stack">
    <div class="sidebar-stage">
      <span class="shadow hover"></span>
      <span class="shadow-b hover"></span>
      <div class="sidebar-swatch hover"></div>
    </div>
    <div class="label">sidebar · hover-overlay</div>
    <div class="val">A : 170% w · 6h · 4 blur · 60% α<br>B : 90% w · 3h · 2 blur · 85% α</div>
  </div>
</div>
</body></html>
