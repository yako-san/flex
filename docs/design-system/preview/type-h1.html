<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--font-sans); }
  .card { padding: 24px; color: var(--dark);
          display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  /* Each line carries its OWN #929292 plate with 10pt padding —
     tight to each piece of text individually. */
  .eyebrow {
    display: inline-block;
    background: #929292; padding: 10px; border-radius: 6px;
    font-size: 13px; font-weight: 700; color: #ffffff;
    text-transform: lowercase; line-height: 1;
  }
  .h1 {
    display: inline-block;
    background: #929292; padding: 10px; border-radius: 6px;
    color: #fff056; font-weight: 300; font-size: 50px;
    line-height: 1; margin: 0;
  }
  .subline {
    display: inline-block;
    background: #929292; padding: 10px; border-radius: 6px;
    font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1;
  }
</style></head>
<body>
<div class="card">
  <span class="eyebrow">vélos en atelier</span>
  <h1 class="h1">Inventaire</h1>
  <span class="subline">14 BDT actifs · 3 RV · 1 ÉVAL. · 3 APPROUVÉ · 2 ON BENCH</span>
</div>
</body></html>
