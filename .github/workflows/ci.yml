name: CI

# Pipeline minimal : tests Vitest + type-check + build Next.js.
# Pas besoin de DATABASE_URL ni de secrets — Next.js skip la validation
# runtime au build et nos tests utilisent des mocks Prisma.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Validate Prisma schema
        run: pnpm prisma validate

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        # Non bloquant transitoirement. À durcir (continue-on-error: false)
        # avant 2026-07-01 — ouvrir un suivi GitHub si dépassé.
        continue-on-error: true
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Cache .next build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Bust le cache au moindre changement de lockfile, sources ou
          # traductions next-intl.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', 'messages/**/*.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build
